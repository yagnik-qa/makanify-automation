sonar.projectKey=makanify-automation
sonar.projectName=Makanify Automation
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Defaults to .
sonar.sources=.

# Exclusions
sonar.exclusions=**/node_modules/**, **/.venv/**, **/reports/**, **/screenshots/**, **/.pytest_cache/**, **/test-results/**, **/playwright-report/**

# Host Configuration
sonar.host.url=http://localhost:9000

# Encoding of the source code
sonar.sourceEncoding=UTF-8

