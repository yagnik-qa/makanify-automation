name: Playwright Python CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Get Playwright version
      id: playwright-version
      run: |
        echo "version=$(python -c 'import playwright; print(playwright.__version__)')" >> $GITHUB_OUTPUT

    - name: Cache Playwright Browsers
      id: cache-playwright
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright System Dependencies & Browsers
      if: steps.cache-playwright.outputs.cache-hit != 'true'
      run: python -m playwright install --with-deps

    - name: Install Playwright System Dependencies (cache hit fallback)
      if: steps.cache-playwright.outputs.cache-hit == 'true'
      run: python -m playwright install-deps

    - name: Run Playwright tests
      env:
        MAKANIFY_EMAIL: ${{ secrets.MAKANIFY_EMAIL }}
        MAKANIFY_PASSWORD: ${{ secrets.MAKANIFY_PASSWORD }}
      run: pytest --tracing=retain-on-failure --junitxml=report.xml

    - name: Generate Test Summary
      if: always()
      run: |
        cat << 'EOF' > generate_summary.py
        import xml.etree.ElementTree as ET
        import os

        if not os.path.exists('report.xml'):
            print('No test report found')
            exit(0)

        tree = ET.parse('report.xml')
        root = tree.getroot()

        summary = []
        summary.append('### 🧪 Playwright Test Execution Summary')
        summary.append('| Test Case | Status | Duration (s) | Message |')
        summary.append('| --- | --- | --- | --- |')

        for testsuite in root.findall('testsuite'):
            for testcase in testsuite.findall('testcase'):
                name = testcase.get('name')
                classname = testcase.get('classname')
                time = testcase.get('time')

                status = '✅ PASSED'
                msg = ''

                failure = testcase.find('failure')
                error = testcase.find('error')
                skipped = testcase.find('skipped')

                if failure is not None:
                    status = '❌ FAILED'
                    msg = failure.get('message', 'Failure')
                elif error is not None:
                    status = '💥 ERROR'
                    msg = error.get('message', 'Error')
                elif skipped is not None:
                    status = '⏭️ SKIPPED'
                    msg = skipped.get('message', '')

                test_path = f"{classname}.py::{name}"
                msg_safe = msg.replace('|', '\\|').replace('\n', ' ')
                summary.append(f'| `{test_path}` | {status} | {time}s | {msg_safe} |')

        with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as f:
            f.write('\n'.join(summary) + '\n')
        EOF
        python generate_summary.py

    - name: Upload test artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-test-results
        path: |
          screenshots/
          test-results/
        if-no-files-found: ignore
        retention-days: 30
